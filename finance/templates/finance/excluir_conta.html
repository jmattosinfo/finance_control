{% extends 'finance/base.html' %}

{% block content %}
<h2>Excluir Conta</h2>

<p>Tem certeza que deseja excluir sua conta? Essa ação é irreversível.</p>

<form method="POST">
    {% csrf_token %}
    <button class="btn btn-danger" type="submit">Sim</button>
    <a href="{% url 'login' %}" class="btn btn-secondary">Cancelar</a>
</form>
{% endblock %}
