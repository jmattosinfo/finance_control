{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gráfico do Mês - {{ mes_nome }} {{ ano }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
      body {
        background-color: #f8f9fa;
      }
      .chart-container {
        position: relative;
        margin: auto;
        height: 350px; /* Altura controlada */
        width: 100%;
      }
      /* Limita a largura do card para o gráfico não esticar */
      .graph-card {
        max-width: 600px;
        margin: auto;
        border-radius: 15px;
        border: none;
      }
    </style>
  </head>
  <body>
    <div class="container mt-5">
      <div class="d-flex justify-content-between align-items-center mb-4 graph-card">
        <a href="{% url 'grafico_mes' ano=ano_anterior mes=mes_anterior %}" class="btn btn-outline-secondary btn-sm rounded-pill px-3"><i class="fa-solid fa-chevron-left"></i> {{ mes_anterior_nome }}</a>
        <h4 class="fw-bold mb-0">{{ mes_nome }} / {{ ano }}</h4>
        <a href="{% url 'grafico_mes' ano=ano_proximo mes=mes_proximo %}" class="btn btn-outline-secondary btn-sm rounded-pill px-3">{{ mes_proximo_nome }} <i class="fa-solid fa-chevron-right"></i></a>
      </div>

      <div class="card shadow-sm p-4 graph-card">
        <div class="text-center mb-3">
          <span class="badge bg-light text-dark border">Comparativo Realizado vs Previsto</span>
        </div>

        <div class="chart-container">
          <canvas id="graficoMes"></canvas>
        </div>
      </div>

      <div class="text-center mt-4">
        <a href="{% url 'mes_atual' ano=ano mes=mes %}" class="btn btn-dark rounded-pill px-4 shadow-sm"><i class="fa-solid fa-arrow-left me-2"></i> Voltar para Detalhes</a>
      </div>
    </div>

    <script>
    document.addEventListener("DOMContentLoaded", function () {
        const ctx = document.getElementById('graficoMes').getContext('2d');

        new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Entradas', 'Saídas', 'Guardar'],
                datasets: [
                    {
                        label: 'Realizado (R$)',
                        data: [
                            {{ total_entradas|default:0|stringformat:".2f" }},
                            {{ total_saidas|default:0|stringformat:".2f" }},
                            {{ total_guardar|default:0|stringformat:".2f" }}
                        ],
                        backgroundColor: ['#2ecc71', '#e74c3c', '#f1c40f'],
                        hoverOffset: 10,
                        borderWidth: 2,
                        borderColor: '#ffffff'
                    },
                    {
                        label: 'Previsto (R$)',
                        data: [
                            {{ total_prev_entradas|default:0|stringformat:".2f" }},
                            {{ total_prev_saidas|default:0|stringformat:".2f" }},
                            {{ total_prev_guardar|default:0|stringformat:".2f" }}
                        ],
                        backgroundColor: ['#a2f0c1', '#f5b7b1', '#fef9e7'],
                        hoverOffset: 10,
                        borderWidth: 2,
                        borderColor: '#ffffff'
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                cutout: '65%',
                plugins: {
                    legend: {
                        position: 'bottom',
                        labels: {
                            usePointStyle: true,
                            padding: 25,
                            font: { size: 13 }
                        }
                    },
                    tooltip: {
                        callbacks: {
                            label: function(context) {
                                let label = context.dataset.label || '';
                                if (label) { label += ': '; }
                                if (context.parsed !== null) {
                                    label += new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(context.parsed);
                                }
                                return label;
                            }
                        }
                    }
                }
            }
        });
    });
    </script>
  </body>
</html>
