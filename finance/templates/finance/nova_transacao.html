{% extends 'finance/base.html' %}
{% block title %}
  Nova Transação
{% endblock %}

{% block content %}
  <div class="container mt-5">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="card shadow p-4">
          <h2 class="mb-4 text-center">🧾 Nova Transação</h2>

          <form method="post" class="needs-validation">
            {% csrf_token %}

            {% for field in form %}
              <div class="mb-3">
                <label class="form-label font-weight-bold">{{ field.label }}</label>
                {{ field }}
                {% if field.help_text %}
                  <small class="form-text text-muted">{{ field.help_text }}</small>
                {% endif %}
              </div>
            {% endfor %}

            <button type="submit" class="btn btn-success w-100 mt-3">Salvar Transação</button>
          </form>
          <a href="{% url 'home' %}" class="btn btn-outline-secondary w-100 mt-2">Cancelar</a>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
