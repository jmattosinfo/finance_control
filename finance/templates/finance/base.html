<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>
      {% block title %}
        Finance Control
      {% endblock %}
    </title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

    <style>
      /* Definindo a cor padrão para todo o sistema */
      .bg-custom-navbar {
        background-color: #2c3e50 !important;
      }
      body {
        background-color: #f8f9fa;
      }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-custom-navbar shadow-sm mb-4">
      <div class="container">
        <a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="{% url 'mes_atual' %}"><i class="fa-solid fa-wallet text-info"></i> Finance Control</a>

        <div class="d-flex align-items-center gap-2">
          {% if user.is_authenticated %}
            <span class="text-white-50 small d-none d-sm-inline me-2">Olá, {{ user.username }}</span>

            <a href="{% url 'editar_conta' %}" class="btn btn-sm btn-outline-light rounded-pill px-3 border-0" title="Perfil"><i class="fa-solid fa-user-gear"></i></a>

            <form action="{% url 'logout' %}" method="post" class="d-inline">
              {% csrf_token %}
              <button type="submit" class="btn btn-sm btn-danger rounded-pill px-3 shadow-sm"><i class="fa-solid fa-right-from-bracket"></i> Sair</button>
            </form>
          {% endif %}
        </div>
      </div>
    </nav>

    <div class="container">
      {% if messages %}
        <div class="row justify-content-center">
          <div class="col-md-8">
            {% for message in messages %}
              <div class="alert alert-{{ message.tags }} alert-dismissible fade show shadow-sm" role="alert">
                <i class="fa-solid fa-circle-info me-2"></i> {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
              </div>
            {% endfor %}
          </div>
        </div>
      {% endif %}

      {% block content %}

      {% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
